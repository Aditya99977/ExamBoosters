<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <meta
      name="description"
      content="VNAverse (Vision Nexus Academy) is an AI-powered learning ecosystem where vision meets knowledge, empowering learners through intelligent education, personalized learning, mock tests, analytics, and AI-driven experiences."

    <meta
      name="keywords"
      content="VNAverse, Vision Nexus Academy, AI Learning Platform, Online Education, Mock Tests, Practice Questions, Competitive Exams, Personalized Learning, Student Dashboard, Exam Preparation"

    <meta
      name="author"
      content="VNAverse"
    />

    <meta
      name="theme-color"
      content="#0B1220"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="VNAverse | Vision Nexus Academy"
    />

    <meta
      property="og:description"
      content="AI-powered learning ecosystem helping students learn smarter through intelligent tools, personalized education, analytics, and practice."

      property="og:type"
      content="website"
    />

    <meta

    />

    <meta
      name="twitter:card"

    />

      name="twitter:title"

    />

    <meta

      name="twitter:image"

    <link
      rel="preconnect"

    <link

    <link
